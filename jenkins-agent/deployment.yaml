apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins-agent
  labels:
    app: jenkins-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jenkins-agent
  template:
    metadata:
      labels:
        app: jenkins-agent
    spec:
      securityContext:
        runAsUser: 0
      containers:
      - name: jnlp
        image: jenkins-agent-kubectl:latest
        imagePullPolicy: Never
        args:
        - "-url"
        - "http://jenkins-service" 
        - "-name"
        - "k8s-agent-1"
        - "-secret"
        - "$(JENKINS_SECRET)"
        - "-tunnel"
        - "jenkins-service:50000"
        - "-workDir"
        - "/home/jenkins/agent"
        env:
        - name: JENKINS_URL
          value: "http://jenkins-service"
        - name: JENKINS_SECRET
          valueFrom:
            secretKeyRef:
              name: jenkins-agent-secret
              key: secret
        - name: JENKINS_AGENT_NAME
          value: "k8s-agent-1"
        - name: JENKINS_AGENT_WORKDIR
          value: "/home/jenkins/agent"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        volumeMounts:
        - name: workspace
          mountPath: /home/jenkins/agent
        - name: docker-sock
          mountPath: /var/run/docker.sock
      volumes:
      - name: workspace
        emptyDir: {}
      - name: docker-sock
        hostPath:
          path: /var/run/docker.sock
          type: Socket